name: Build and Deploy Plantz
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login your-registry.example.com -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Build and Push
        run: |
          SHA_TAG="your-registry.example.com/your-username/plantz:${{ gitea.sha }}"
          LATEST_TAG="your-registry.example.com/your-username/plantz:latest"
          docker build -t "$SHA_TAG" -t "$LATEST_TAG" .
          docker push "$SHA_TAG"
          docker push "$LATEST_TAG"

  deploy-swarm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update Swarm Service
        run: |
          docker service update \
            --image "your-registry.example.com/your-username/plantz:latest" \
            --force \
            --with-registry-auth \
            your-swarm-service-name

      - name: Wait for service to be healthy
        run: |
          echo "Waiting for rollout to complete..."
          for i in $(seq 1 24); do
            STATE=$(docker service ps your-swarm-service-name \
              --filter "desired-state=running" \
              --format '{{.CurrentState}}' | head -1)
            echo "  [$i/24] State: $STATE"
            case "$STATE" in
              "Running"*)
                echo "Service is up."
                exit 0
                ;;
              "Failed"*|"Rejected"*)
                echo "Deployment failed: $STATE" >&2
                docker service ps your-swarm-service-name --no-trunc
                exit 1
                ;;
            esac
            if [ "$i" = "24" ]; then
              echo "Timeout waiting for service to stabilize." >&2
              docker service ps your-swarm-service-name --no-trunc
              exit 1
            fi
            sleep 5
          done

      - name: Health check
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          APP_URL="${APP_URL%/}"
          if [ -z "$APP_URL" ]; then
            echo "APP_URL not configured, skipping health check"
            exit 0
          fi
          HEALTH=$(curl -s -L -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$APP_URL/api/health" || echo "CURL_FAILED")
          if [ "$HEALTH" = "CURL_FAILED" ]; then
            echo "Health check: curl failed (network unreachable from runner), skipping"
            exit 0
          fi
          if [ "$HEALTH" != "200" ]; then
            echo "Health check failed (HTTP $HEALTH)" >&2
            docker service ps your-swarm-service-name --no-trunc
            exit 1
          fi
          echo "Health check passed (HTTP $HEALTH)"
